name: Release

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送 v1.0.0, v2.1.0 等格式的标签

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 创建 Release 所需权限
      packages: read   # 如需读取包，但这里我们只上传到 Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史以处理标签

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run validation
      run: |
        chmod +x scripts/validate.py
        python scripts/validate.py

    - name: Build release package
      run: |
        make package

    - name: Get version from tag
      id: vars
      run: |
        # 从标签名提取版本号（去掉 'v' 前缀）
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ steps.vars.outputs.version }}
        body: |
          ## Release ${{ steps.vars.outputs.version }}

          ### ✅ Changes
          - Automated release from tag ${{ github.ref_name }}
          - See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details

          ### 📦 Assets
          - OPCStartup-main.zip: Complete skill package
        files: |
          dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Summary
      run: |
        echo "✅ Release ${{ steps.vars.outputs.version }} published successfully!"
        echo "📎 Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
