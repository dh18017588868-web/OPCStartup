name: Bug Report
description: Report a problem or unexpected behavior
title: "[BUG] "
labels: bug
body:
  - type: checkboxes
    attributes:
      label: Checklist
      description: |
        Please ensure you've completed the following before submitting:
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have reproduced this with the latest version
          required: true
        - label: I have included relevant logs or screenshots
          required: false
  - type: textarea
    attributes:
      label: Description
      description: |
        Describe the bug, what happened, and what you expected to happen.
      placeholder: |
        Clear description of the bug...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: |
        List the steps to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: |
        Provide OS, Python version, Hermes/Agent version.
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.10
        - Hermes version: ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional Information
      description: |
        Logs, screenshots, error messages, etc.
      placeholder: |
        ```python
        # error traceback
        ```
