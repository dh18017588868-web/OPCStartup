<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>[[product_name]] - 立即体验</title>
    <style>
        body {font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; line-height: 1.6;}
        .hero {text-align: center; margin-bottom: 30px;}
        .value {font-size: 1.2em; color: #555; margin-bottom: 20px;}
        .cta {background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1.1em; cursor: pointer;}
        .features {list-style: none; padding: 0;}
        .features li {padding: 8px 0; border-bottom: 1px solid #eee;}
    </style>
</head>
<body>
    <div class="hero">
        <h1>[[product_name]]</h1>
        <p class="value">[[value_proposition]]</p>
        <button class="cta" onclick="alert('演示注册')">[[cta_text]]</button>
    </div>
    <h2>核心功能</h2>
    <ul class="features">
        <li>[[feature_1]]</li>
        <li>[[feature_2]]</li>
        <li>[[feature_3]]</li>
    </ul>
    <p>📧 订阅更新：<input type="email" placeholder="your@email.com" style="padding:8px;width:80%"></p>
</body>
</html>
